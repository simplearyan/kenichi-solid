<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenichi Studio | Version Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --primary: #10b981;
            --text: #ffffff;
            --text-muted: #666666;
            --border: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Background Grain */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Cfilter id='noiseFilter'%3%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3%3C/filter%3%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3%3C/svg%3");
            opacity: 0.03;
            pointer-events: none;
            z-index: 100;
        }

        header {
            padding: 80px 20px;
            text-align: center;
            width: 100%;
            max-width: 800px;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-bottom: 20px;
        }

        .logo span:last-child {
            color: var(--primary);
            font-weight: 400;
        }

        .logo-dot {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            margin-left: 2px;
            box-shadow: 0 0 10px var(--primary);
        }

        h1 {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: -0.04em;
            margin-bottom: 12px;
            background: linear-gradient(to bottom, #fff 0%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        main {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
            flex: 1;
        }

        .version-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .version-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .version-card:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
            background: #111;
        }

        .version-card::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top right, rgba(16, 185, 129, 0.1), transparent 50%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .version-card:hover::after {
            opacity: 1;
        }

        .version-tag {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: var(--text);
        }

        .version-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .version-date {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .btn-preview {
            background: var(--primary);
            color: #000;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 800;
            text-align: center;
            transition: transform 0.2s;
            position: relative;
            z-index: 1;
        }

        .version-card:hover .btn-preview {
            transform: scale(1.02);
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 14px;
        }

        footer {
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }
    </style>
</head>
<body>
    <header class="fade-in">
        <div class="logo">
            KENICHI<span>STUDIO</span>
            <div class="logo-dot"></div>
        </div>
        <h1>Version Portal</h1>
        <p class="subtitle">Experience the evolution</p>
    </header>

    <main>
        <div id="portal-content" class="fade-in" style="animation-delay: 0.1s;">
            <div class="loading">Discovering releases...</div>
        </div>
    </main>

    <footer>
        &copy; 2026 Kenichi Studio. All rights reserved.
    </footer>

    <script>
        async function loadVersions() {
            const content = document.getElementById('portal-content');
            try {
                // In production, this file is generated by the GitHub Action
                const response = await fetch('versions.json');
                const data = await response.json();
                
                if (!data.versions || data.versions.length === 0) {
                    content.innerHTML = '<div class="loading">No versions deployed yet.</div>';
                    return;
                }

                // Sort versions by date descending
                const sortedVersions = data.versions.sort((a, b) => new Date(b.date) - new Date(a.date));

                content.innerHTML = `
                    <div class="version-grid">
                        ${sortedVersions.map(v => `
                            <a href="../${v.tag}/" class="version-card">
                                <div class="version-tag">${v.tag}</div>
                                <div class="version-info">
                                    <div class="version-date">${new Date(v.date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</div>
                                    <div style="color: var(--primary); font-size: 10px; font-weight: 800; text-transform: uppercase; margin-top: 4px;">Production Ready</div>
                                </div>
                                <div class="btn-preview">Launch Editor</div>
                            </a>
                        `).join('')}
                    </div>
                `;
            } catch (error) {
                console.error('Error loading versions:', error);
                content.innerHTML = '<div class="loading">Error loading versions. Please check back later.</div>';
            }
        }

        loadVersions();
    </script>
</body>
</html>
