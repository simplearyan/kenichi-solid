name: Deploy Multi-Version

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Deployment Mode'
        required: true
        default: 'single'
        type: choice
        options:
          - single
          - bootstrap-last-4

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-gh-pages # Prevent simultaneous deploys
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Process Versions 🔄
        run: |
          set -e # Exit immediately if a command fails
          mkdir -p deploy_root
          
          # 1. Fetch all tags for versioning
          echo "Fetching tags..."
          git fetch --tags --force
          
          # 2. Clone the EXISTING gh-pages branch content (Authenticated)
          echo "Cloning existing deployment from gh-pages..."
          git clone --depth 1 --branch gh-pages "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages-temp || mkdir gh-pages-temp
          
          if [ -d "gh-pages-temp" ]; then
            echo "Merging existing files into deploy_root..."
            cp -r gh-pages-temp/* deploy_root/ 2>/dev/null || true
            rm -rf gh-pages-temp
          fi
          rm -rf deploy_root/.git

          # 3. Handle bootstrap or single deployment
          if [ "${{ github.event.inputs.mode }}" == "bootstrap-last-4" ]; then
            echo ">>> MODE: BOOTSTRAP LAST 4 TAGS"
            TAGS=$(git tag -l 'v*' --sort=-v:refname | head -n 4)
            for TAG in $TAGS; do
              echo ">>> Building Version: $TAG"
              git checkout $TAG
              npm install
              npm run build
              mkdir -p "deploy_root/$TAG"
              cp -r dist/* "deploy_root/$TAG/"
              
              node -e "
                const fs = require('fs');
                const archiveDir = 'deploy_root/archive';
                if (!fs.existsSync(archiveDir)) fs.mkdirSync(archiveDir, {recursive: true});
                const data = fs.existsSync(archiveDir + '/versions.json') ? JSON.parse(fs.readFileSync(archiveDir + '/versions.json')) : {versions: []};
                if (!data.versions.find(v => v.tag === '$TAG')) {
                  data.versions.push({ tag: '$TAG', date: new Date().toISOString() });
                  fs.writeFileSync(archiveDir + '/versions.json', JSON.stringify(data, null, 2));
                }
              "
            done
            git checkout main
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo ">>> MODE: TAG DEPLOYMENT (${{ github.ref_name }})"
            npm install
            npm run build
            if [ ! -d "dist" ]; then echo "Error: dist folder not found!"; exit 1; fi
            mkdir -p "deploy_root/${{ github.ref_name }}"
            cp -r dist/* "deploy_root/${{ github.ref_name }}/"
            
            node -e "
              const fs = require('fs');
              const archiveDir = 'deploy_root/archive';
              if (!fs.existsSync(archiveDir)) fs.mkdirSync(archiveDir, {recursive: true});
              const data = fs.existsSync(archiveDir + '/versions.json') ? JSON.parse(fs.readFileSync(archiveDir + '/versions.json')) : {versions: []};
              if (!data.versions.find(v => v.tag === '${{ github.ref_name }}')) {
                data.versions.push({ tag: '${{ github.ref_name }}', date: new Date().toISOString() });
                fs.writeFileSync(archiveDir + '/versions.json', JSON.stringify(data, null, 2));
              }
            "
          else
            echo ">>> MODE: MAIN/ROOT DEPLOYMENT"
            npm install
            npm run build
            if [ ! -d "dist" ]; then echo "Error: dist folder not found!"; exit 1; fi
            # Update the ROOT of the site
            cp -r dist/* deploy_root/
          fi
          
          # 4. Final Portal Update
          echo "Updating version portal..."
          mkdir -p deploy_root/archive
          cp portal/index.html deploy_root/archive/index.html
          
          echo "Final deployment structure:"
          ls -R deploy_root

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy_root
          branch: gh-pages
          clean: true # Safe now because we merged existing files into deploy_root
          single-commit: true
