name: Deploy Multi-Version

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Deployment Mode'
        required: true
        default: 'single'
        type: choice
        options:
          - single
          - bootstrap-last-4

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-gh-pages # Prevent simultaneous deploys
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Temporarily disable cache to force a fresh build of the new UI
          # cache: 'npm'

      - name: Process Versions 🔄
        run: |
          set -e
          mkdir -p deploy_root
          
          echo ">>> 1. Fetching Tags"
          git fetch --tags --force
          
          echo ">>> 2. Cloning existing gh-pages"
          git clone --depth 1 --branch gh-pages "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages-temp || mkdir gh-pages-temp
          
          if [ -d "gh-pages-temp" ]; then
            echo "Merging existing archive and versions..."
            cp -r gh-pages-temp/* deploy_root/ 2>/dev/null || true
            rm -rf gh-pages-temp
          fi
          rm -rf deploy_root/.git

          # 3. Build Logic
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo ">>> MODE: TAG DEPLOYMENT (${{ github.ref_name }})"
            npm install && npm run build
            mkdir -p "deploy_root/${{ github.ref_name }}"
            cp -r dist/* "deploy_root/${{ github.ref_name }}/"
            
            node -e "
              const fs = require('fs');
              const archiveDir = 'deploy_root/archive';
              if (!fs.existsSync(archiveDir)) fs.mkdirSync(archiveDir, {recursive: true});
              const data = fs.existsSync(archiveDir + '/versions.json') ? JSON.parse(fs.readFileSync(archiveDir + '/versions.json')) : {versions: []};
              if (!data.versions.find(v => v.tag === '${{ github.ref_name }}')) {
                data.versions.push({ tag: '${{ github.ref_name }}', date: new Date().toISOString() });
                fs.writeFileSync(archiveDir + '/versions.json', JSON.stringify(data, null, 2));
              }
            "
          else
            echo ">>> MODE: MAIN/ROOT DEPLOYMENT"
            npm install && npm run build
            
            echo ">>> Verifying Build Output..."
            ls -la dist/
            # Check if our new Info icon is actually in the build
            if grep -q "Project Info" dist/index.html; then
              echo "✅ Info Icon verified in build!"
            else
              echo "❌ Error: Info Icon missing from build! Forcing failure."
              exit 1
            fi
            
            # Update the ROOT
            cp -r dist/* deploy_root/
          fi
          
          echo ">>> 4. Updating Portal"
          mkdir -p deploy_root/archive
          cp portal/index.html deploy_root/archive/index.html
          
          echo ">>> 5. Final Structure Check"
          ls -R deploy_root/archive

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy_root
          branch: gh-pages
          clean: true # Safe now because we merged existing files into deploy_root
          single-commit: true
