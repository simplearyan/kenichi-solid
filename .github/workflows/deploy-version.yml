name: Deploy Multi-Version

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    concurrency: ci-gh-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Process Versions 🔄
        run: |
          set -e
          set -x
          
          # 1. Fetch tags
          git fetch --tags --force
          
          # 2. Prepare the build directory
          npm install
          npm run build
          
          # 3. Bring in old versions from the 'gh-pages' vault
          echo "Fetching historical versions from gh-pages vault..."
          git clone --depth 1 --branch gh-pages "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" vault || mkdir vault
          
          # Copy everything from vault to dist, BUT don't overwrite the NEW build
          cp -rn vault/* dist/ 2>/dev/null || true
          
          # 4. Handle Archive Portal
          mkdir -p dist/archive
          cp portal/index.html dist/archive/index.html
          
          if [ -f vault/archive/versions.json ]; then
            cp vault/archive/versions.json dist/archive/versions.json
          fi

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo ">>> Registering Tag: ${{ github.ref_name }}"
            mkdir -p "dist/${{ github.ref_name }}"
            cp -r dist/* "dist/${{ github.ref_name }}/" 2>/dev/null || true
            
            node -e "
              const fs = require('fs');
              const arch = 'dist/archive/versions.json';
              const data = fs.existsSync(arch) ? JSON.parse(fs.readFileSync(arch)) : {versions: []};
              if (!data.versions.find(v => v.tag === '${{ github.ref_name }}')) {
                data.versions.push({ tag: '${{ github.ref_name }}', date: new Date().toISOString() });
                fs.writeFileSync(arch, JSON.stringify(data, null, 2));
              }
            "
          fi

          # 5. Save the updated state back to the 'gh-pages' vault for next time
          mkdir -p vault_update
          cp -r dist/* vault_update/
          cd vault_update
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "update vault from ${{ github.sha }}"
          git push "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages --force
          cd ..

      - name: Upload Artifact 📦
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
