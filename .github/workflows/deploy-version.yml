name: Deploy Multi-Version

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Deployment Mode'
        required: true
        default: 'single'
        type: choice
        options:
          - single
          - bootstrap-last-4

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Process Versions 🔄
        run: |
          mkdir -p deploy_root
          
          # Ensure all tags are available locally
          git fetch --tags --force
          
          # Initialize versions.json in the archive folder
          mkdir -p deploy_root/archive
          git clone --depth 1 --branch gh-pages https://github.com/${{ github.repository }}.git gh-pages-branch || mkdir gh-pages-branch
          if [ -f gh-pages-branch/archive/versions.json ]; then
            cp gh-pages-branch/archive/versions.json deploy_root/archive/versions.json
          else
            echo '{"versions": []}' > deploy_root/archive/versions.json
          fi

          if [ "${{ github.event.inputs.mode }}" == "bootstrap-last-4" ]; then
            echo "Running Bootstrap Mode for last 4 tags..."
            TAGS=$(git tag -l 'v*' --sort=-v:refname | head -n 4)
            for TAG in $TAGS; do
              echo "Processing $TAG..."
              git checkout $TAG
              npm install
              npm run build
              mkdir -p "deploy_root/$TAG"
              cp -r dist/* "deploy_root/$TAG/"
              
              node -e "
                const fs = require('fs');
                const data = JSON.parse(fs.readFileSync('deploy_root/archive/versions.json'));
                if (!data.versions.find(v => v.tag === '$TAG')) {
                  data.versions.push({ tag: '$TAG', date: new Date().toISOString() });
                  fs.writeFileSync('deploy_root/archive/versions.json', JSON.stringify(data, null, 2));
                }
              "
            done
            git checkout ${{ github.event.repository.default_branch }}
          else
            echo "Running Single Version Mode for ${{ github.ref_name }}..."
            npm install
            npm run build
            mkdir -p "deploy_root/${{ github.ref_name }}"
            cp -r dist/* "deploy_root/${{ github.ref_name }}/"
            
            node -e "
              const fs = require('fs');
              const data = JSON.parse(fs.readFileSync('deploy_root/archive/versions.json'));
              if (!data.versions.find(v => v.tag === '${{ github.ref_name }}')) {
                data.versions.push({ tag: '${{ github.ref_name }}', date: new Date().toISOString() });
                fs.writeFileSync('deploy_root/archive/versions.json', JSON.stringify(data, null, 2));
              }
            "
          fi
          
          # Copy the portal landing page to the archive subfolder
          cp portal/index.html deploy_root/archive/index.html
          
          echo "Final deployment structure:"
          ls -R deploy_root

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy_root
          branch: gh-pages
          clean: false # IMPORTANT: Do not delete previous versions
          single-commit: true # Keep the history clean
